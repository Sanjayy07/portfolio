<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #f4f4f4;
        }

        .hero {
            background-color: #0d6efd;
            color: white;
            padding: 50px;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        /* Popup Styling */
        .popup {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #0d6efd;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px gray;
            text-align: center;
            width: 300px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Sanjay</h1>
        <p>Student | Web Developer</p>
    </div>

    <!-- About Section -->
    <div class="container mt-4">
        <h2>About Me</h2>
        <p>I am learning HTML, CSS, Bootstrap, Java and AI.</p>
    </div>

    <!-- Projects Section -->
    <div class="container mt-4">
        <h2>Projects</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Project 1</h4>
                    <p>Portfolio Website</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Project 2</h4>
                    <p>Calculator App</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Project 3</h4>
                    <p>Student Management System</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Contact Section -->
    <div class="container mt-4 mb-4">
        <h2>Contact</h2>

        <button id="contactBtn" class="btn btn-primary">
            Contact Me
        </button>
    </div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Popup -->
    <div class="popup">
        <h4>Contact Details</h4>
        <p>Email: sanjay@example.com</p>
        <p>Phone: +91 9876543210</p>
        <button id="closeBtn" class="btn btn-danger">Close</button>
    </div>

    <script>
        $(document).ready(function(){

            $("#contactBtn").click(function(){
                $(".overlay").fadeIn();
                $(".popup").fadeIn();
            });

            $("#closeBtn").click(function(){
                $(".overlay").fadeOut();
                $(".popup").fadeOut();
            });

        });
    </script>

</body>
</html>
